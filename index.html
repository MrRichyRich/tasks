<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tasks — Mr Rich</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%231c1917'/%3E%3Cpath d='M27 51 L44 68 L74 36' stroke='%23d4502e' stroke-width='11' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E" />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&family=Inter+Tight:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f2ede4;
    --surface: #ffffff;
    --surface-soft: rgba(255,255,255,0.55);
    --border: rgba(28,25,23,0.08);
    --border-hover: rgba(28,25,23,0.18);
    --text: #1c1917;
    --muted: rgba(28,25,23,0.5);
    --hint: rgba(28,25,23,0.3);
    --accent: #d4502e;
    --accent-soft: #f5d4c5;
    --danger: #b8392c;

    --p-high: #d4502e;
    --p-high-bg: #f9dccf;
    --p-med: #c79a3a;
    --p-med-bg: #f3e6c2;
    --p-low: #6a8054;
    --p-low-bg: #dfe6d4;
    --p-none: rgba(28,25,23,0.3);
    --p-none-bg: rgba(28,25,23,0.06);

    --radius: 12px;
    --font-display: 'Fraunces', Georgia, serif;
    --font-body: 'Inter Tight', system-ui, sans-serif;
    --ease: cubic-bezier(0.22, 1, 0.36, 1);
  }

  html, body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; }

  body::before {
    content: '';
    position: fixed; inset: 0;
    pointer-events: none; z-index: 0;
    background:
      radial-gradient(ellipse 80% 50% at 80% 0%, rgba(212,80,46,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 0% 100%, rgba(28,25,23,0.04) 0%, transparent 60%);
  }

  body { min-height: 100vh; padding: 40px 32px 180px; position: relative; }

  /* Header */
  .topbar {
    display: flex; justify-content: space-between; align-items: flex-end;
    margin-bottom: 32px;
    flex-wrap: wrap; gap: 24px;
    max-width: 1400px;
  }
  .reveal { opacity: 0; transform: translateY(12px); animation: rise 0.9s var(--ease) forwards; }
  .reveal.d1 { animation-delay: 0.05s; }
  .reveal.d2 { animation-delay: 0.18s; }
  .reveal.d3 { animation-delay: 0.32s; }
  .reveal.d4 { animation-delay: 0.46s; }
  @keyframes rise { to { opacity: 1; transform: translateY(0); } }

  .eyebrow {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.18em;
    color: var(--muted); font-weight: 500;
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 10px;
  }
  .eyebrow::before { content: ''; width: 24px; height: 1px; background: var(--text); }

  .brand {
    font-family: var(--font-display); font-size: 44px;
    line-height: 0.95; letter-spacing: -0.02em;
    font-weight: 400; font-style: italic;
  }
  .brand em { color: var(--accent); }

  .topbar-right { display: flex; gap: 28px; align-items: flex-end; }
  .stats { display: flex; gap: 28px; }
  .stat { display: flex; flex-direction: column; gap: 2px; }
  .stat-num { font-family: var(--font-display); font-size: 28px; line-height: 1; display: inline-block; }
  .stat-num.accent { color: var(--accent); }
  .stat-num.streak { color: var(--p-med); }
  .stat-num.pulse { animation: pulse 0.4s ease; }
  @keyframes pulse {
    0% { transform: scale(1); } 50% { transform: scale(1.18); } 100% { transform: scale(1); }
  }
  .stat-label {
    font-size: 9px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.14em;
  }
  .stat.clickable {
    cursor: pointer; padding: 4px 8px; margin: -4px -8px;
    border-radius: 8px; transition: background 0.15s;
  }
  .stat.clickable:hover { background: rgba(28,25,23,0.05); }
  .stat.clickable:hover .stat-label::after { content: ' · reset'; color: var(--accent); }

  /* Board */
  .board-wrap { overflow-x: auto; margin: 0 -32px; padding: 4px 32px 24px; }
  .board-wrap::-webkit-scrollbar { height: 8px; }
  .board-wrap::-webkit-scrollbar-track { background: transparent; }
  .board-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .board { display: flex; gap: 16px; align-items: flex-start; min-height: 400px; }

  .column {
    flex: 0 0 320px;
    background: var(--surface-soft);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px;
    display: flex; flex-direction: column;
    max-height: calc(100vh - 320px);
    transition: background 0.2s, border-color 0.2s, transform 0.3s var(--ease);
  }
  .column.fresh { animation: colIn 0.5s var(--ease); }
  @keyframes colIn {
    from { opacity: 0; transform: translateY(10px) scale(0.98); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .column.drag-over { background: var(--accent-soft); border-color: var(--accent); }

  .col-header {
    display: flex; align-items: center; gap: 10px;
    padding: 4px 4px 12px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 12px;
  }
  .col-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .col-name {
    flex: 1; font-size: 13px; font-weight: 500;
    color: var(--text); letter-spacing: 0.01em;
    background: transparent; border: none; outline: none;
    font-family: var(--font-body);
    padding: 2px 4px; border-radius: 4px;
    cursor: text;
  }
  .col-name:focus, .col-name:hover { background: rgba(28,25,23,0.04); }
  .col-count {
    font-size: 10px; color: var(--muted);
    background: rgba(28,25,23,0.06);
    padding: 2px 7px; border-radius: 8px;
    font-weight: 500;
  }
  .col-del {
    background: none; border: none; color: var(--muted);
    cursor: pointer; font-size: 14px; padding: 4px 6px;
    border-radius: 4px; line-height: 1;
    opacity: 0; transition: opacity 0.15s, color 0.15s, background 0.15s;
  }
  .col-header:hover .col-del { opacity: 1; }
  .col-del:hover { color: var(--danger); background: rgba(184,57,44,0.08); }

  .task-list {
    list-style: none; display: flex; flex-direction: column; gap: 8px;
    overflow-y: auto; flex: 1; padding: 2px; margin: -2px; min-height: 40px;
  }
  .task-list::-webkit-scrollbar { width: 6px; }
  .task-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Task card */
  .task-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    cursor: grab;
    display: flex; flex-direction: column; gap: 8px;
    transition: border-color 0.2s, transform 0.25s var(--ease), box-shadow 0.25s, opacity 0.2s;
    position: relative;
  }
  .task-card.fresh { animation: cardIn 0.35s var(--ease); }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .task-card:hover { border-color: var(--border-hover); box-shadow: 0 6px 18px -10px rgba(28,25,23,0.2); }
  .task-card.dragging { opacity: 0.4; cursor: grabbing; transform: rotate(1deg); }
  .task-card.done { opacity: 0.5; }
  .task-card.removing { animation: cardOut 0.25s var(--ease) forwards; }
  @keyframes cardOut {
    to { opacity: 0; transform: translateX(20px); height: 0; padding: 0; margin: 0; border-width: 0; }
  }

  .task-row { display: flex; align-items: flex-start; gap: 10px; }

  .check {
    width: 18px; height: 18px; border-radius: 50%;
    border: 1.5px solid rgba(28,25,23,0.22);
    flex-shrink: 0; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s, border-color 0.2s, transform 0.15s;
    margin-top: 1px;
  }
  .check:hover { border-color: var(--accent); transform: scale(1.1); }
  .check.checked {
    background: var(--accent); border-color: var(--accent);
    animation: bounceCheck 0.5s var(--ease);
  }
  @keyframes bounceCheck {
    0% { transform: scale(1); } 40% { transform: scale(1.3); }
    70% { transform: scale(0.92); } 100% { transform: scale(1); }
  }
  .check.checked::after {
    content: ''; display: block;
    width: 4px; height: 8px;
    border: 2px solid var(--surface);
    border-top: none; border-left: none;
    transform: rotate(45deg) translate(-1px,-1px);
  }

  .task-text {
    flex: 1; font-size: 13.5px; line-height: 1.45;
    color: var(--text); font-weight: 400;
    word-break: break-word; cursor: text; padding: 1px 0;
  }
  .task-card.done .task-text { text-decoration: line-through; color: var(--muted); }

  .task-edit {
    flex: 1; font-size: 13.5px; line-height: 1.45;
    color: var(--text); font-weight: 400;
    background: transparent; border: none; outline: none;
    padding: 0; width: 100%; resize: none;
    font-family: inherit;
  }

  .del-btn {
    opacity: 0;
    background: none; border: none;
    color: var(--muted); font-size: 16px; cursor: pointer;
    padding: 0 4px; line-height: 1; border-radius: 4px;
    transition: color 0.15s, opacity 0.2s, background 0.15s;
    flex-shrink: 0;
  }
  .task-card:hover .del-btn { opacity: 1; }
  .del-btn:hover { color: var(--danger); background: rgba(184,57,44,0.08); }

  .task-meta { display: flex; align-items: center; gap: 6px; padding-left: 28px; }
  .priority-chip, .repeat-chip {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 6px;
    cursor: pointer; border: none;
    font-family: var(--font-body);
    transition: opacity 0.15s, transform 0.1s, background 0.15s, color 0.15s;
    user-select: none;
    display: inline-flex; align-items: center; gap: 4px;
  }
  .priority-chip:hover, .repeat-chip:hover { opacity: 0.85; }
  .priority-chip:active, .repeat-chip:active { transform: scale(0.96); }
  .priority-chip[data-p="high"] { background: var(--p-high-bg); color: var(--p-high); }
  .priority-chip[data-p="medium"] { background: var(--p-med-bg); color: var(--p-med); }
  .priority-chip[data-p="low"] { background: var(--p-low-bg); color: var(--p-low); }
  .priority-chip[data-p="none"] { background: var(--p-none-bg); color: var(--p-none); }
  .repeat-chip { background: var(--p-none-bg); color: var(--p-none); }
  .repeat-chip.active { background: var(--accent-soft); color: var(--accent); }
  .repeat-chip svg { width: 10px; height: 10px; }

  .today-chip {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 6px;
    cursor: pointer; border: none;
    font-family: var(--font-body);
    transition: opacity 0.15s, transform 0.1s, background 0.15s, color 0.15s;
    user-select: none;
    display: inline-flex; align-items: center; gap: 4px;
    background: var(--p-none-bg); color: var(--p-none);
  }
  .today-chip:hover { opacity: 0.85; }
  .today-chip:active { transform: scale(0.96); }
  .today-chip.active { background: var(--p-low-bg); color: var(--p-low); }
  .today-chip svg { width: 10px; height: 10px; }

  /* Add controls */
  .add-task {
    margin-top: 10px;
    border: 1px dashed var(--border);
    border-radius: 10px;
    padding: 8px 10px;
    background: transparent;
    color: var(--muted);
    font-family: var(--font-body); font-size: 12px;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s, background 0.2s;
    text-align: left;
  }
  .add-task:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }
  .add-task-input {
    margin-top: 10px;
    border: 1px solid var(--accent);
    border-radius: 10px;
    padding: 9px 10px;
    background: var(--surface);
    color: var(--text);
    font-family: var(--font-body); font-size: 13px;
    width: 100%; outline: none;
    box-shadow: 0 0 0 4px var(--accent-soft);
  }
  .add-task-input::placeholder { color: var(--hint); }

  .add-column {
    flex: 0 0 280px; align-self: flex-start;
    border: 1px dashed var(--border); border-radius: 14px;
    padding: 16px; background: transparent;
    color: var(--muted);
    font-family: var(--font-body); font-size: 13px; font-weight: 500;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s, background 0.2s;
    text-align: center;
  }
  .add-column:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }
  .add-column-form {
    flex: 0 0 280px; align-self: flex-start;
    border: 1px solid var(--accent); border-radius: 14px;
    padding: 14px; background: var(--surface);
    box-shadow: 0 0 0 4px var(--accent-soft);
    display: flex; flex-direction: column; gap: 10px;
  }
  .add-column-form input {
    background: transparent; border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 10px;
    font-family: var(--font-body); font-size: 13px;
    color: var(--text); outline: none;
  }
  .add-column-form input:focus { border-color: var(--accent); }
  .color-picker { display: flex; gap: 6px; flex-wrap: wrap; }
  .color-swatch {
    width: 22px; height: 22px; border-radius: 50%;
    border: 2px solid transparent;
    cursor: pointer; transition: transform 0.15s, border-color 0.15s;
  }
  .color-swatch:hover { transform: scale(1.15); }
  .color-swatch.selected { border-color: var(--text); }
  .form-actions { display: flex; gap: 6px; }
  .form-btn {
    flex: 1; padding: 8px 10px;
    border: none; border-radius: 8px;
    font-family: var(--font-body); font-size: 12px; font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .form-btn.primary { background: var(--text); color: var(--bg); }
  .form-btn.primary:hover { background: var(--accent); }
  .form-btn.secondary { background: transparent; color: var(--muted); }
  .form-btn.secondary:hover { background: rgba(28,25,23,0.06); color: var(--text); }

  .empty-col {
    text-align: center; font-size: 12px;
    color: var(--hint); padding: 16px 0;
    font-style: italic; font-family: var(--font-display);
  }

  .confetti {
    position: fixed; pointer-events: none;
    width: 8px; height: 8px;
    border-radius: 1px; z-index: 1000;
  }

  /* ============ Bottom dock (two rows) ============ */
  .progress-dock {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    z-index: 100;
    background: rgba(242,237,228,0.85);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-top: 1px solid var(--border);
    padding: 14px 32px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .dock-row {
    max-width: 1400px;
    width: 100%;
    margin: 0 auto;
    display: flex; align-items: center; gap: 18px;
  }

  /* Time row (top) */
  .time-meta { display: flex; flex-direction: column; gap: 2px; min-width: 160px; }
  .time-status {
    font-family: var(--font-display);
    font-size: 14px; font-style: italic;
    color: var(--text); line-height: 1;
  }
  .time-sub {
    font-size: 9px; text-transform: uppercase; letter-spacing: 0.14em;
    color: var(--muted); font-weight: 500;
  }

  .time-track-wrap {
    flex: 1; position: relative; height: 22px;
    display: flex; align-items: center;
  }
  .time-track {
    position: relative; width: 100%;
    height: 8px;
    background: rgba(28,25,23,0.06);
    border-radius: 100px;
    overflow: visible;
  }
  .time-track-inner {
    position: relative; width: 100%; height: 100%;
    border-radius: 100px; overflow: hidden;
  }
  .time-fill {
    position: absolute;
    top: 0; left: 0; bottom: 0;
    background: rgba(28,25,23,0.18);
    transition: width 0.5s var(--ease);
  }
  .time-block {
    position: absolute;
    top: 0; bottom: 0;
    opacity: 0.55;
    transition: opacity 0.2s;
  }
  .time-block.past { opacity: 0.18; }
  .time-block.active { opacity: 0.85; animation: blockPulse 2s ease-in-out infinite; }
  @keyframes blockPulse {
    0%, 100% { opacity: 0.7; }
    50% { opacity: 0.95; }
  }
  .time-marker {
    position: absolute;
    top: -4px; bottom: -4px;
    width: 2px;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    border-radius: 1px;
    transition: left 0.5s var(--ease);
    transform: translateX(-1px);
    z-index: 2;
  }

  .time-now {
    font-family: var(--font-display);
    font-size: 22px; line-height: 1;
    color: var(--text); min-width: 64px;
    text-align: right;
    font-feature-settings: "tnum";
  }

  .icon-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 100px;
    width: 34px; height: 34px;
    cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .icon-btn:hover { border-color: var(--accent); color: var(--accent); transform: rotate(45deg); }
  .icon-btn svg { width: 14px; height: 14px; }
  .icon-btn:hover { transform: none; }
  .icon-btn:hover svg { transform: rotate(60deg); transition: transform 0.3s var(--ease); }

  /* Task row (bottom) */
  .progress-meta { display: flex; flex-direction: column; gap: 2px; min-width: 160px; }
  .progress-status {
    font-family: var(--font-display);
    font-size: 15px; font-style: italic;
    color: var(--text); line-height: 1;
    transition: color 0.4s;
  }
  .progress-status.complete { color: var(--accent); }
  .progress-sub {
    font-size: 9px; text-transform: uppercase; letter-spacing: 0.14em;
    color: var(--muted); font-weight: 500;
  }
  .progress-track-wrap { flex: 1; position: relative; height: 22px; display: flex; align-items: center; }
  .progress-track {
    position: relative; width: 100%; height: 8px;
    background: rgba(28,25,23,0.08);
    border-radius: 100px; overflow: hidden;
  }
  .progress-fill {
    position: absolute; top: 0; left: 0; bottom: 0;
    background: linear-gradient(90deg, #d4502e 0%, #e87856 50%, #d4502e 100%);
    background-size: 200% 100%;
    animation: shimmer 3s linear infinite;
    border-radius: 100px;
    transition: width 0.6s var(--ease);
    box-shadow: 0 0 12px -2px var(--accent);
  }
  @keyframes shimmer {
    0% { background-position: 0% 0%; } 100% { background-position: 200% 0%; }
  }
  .progress-fill.complete { box-shadow: 0 0 18px 0 var(--accent); }
  .progress-ticks { position: absolute; inset: 0; pointer-events: none; display: flex; align-items: center; }
  .progress-tick {
    position: absolute; top: 50%;
    width: 2px; height: 4px;
    background: rgba(28,25,23,0.18); border-radius: 1px;
    transform: translate(-1px, -50%);
  }
  .progress-pct {
    font-family: var(--font-display);
    font-size: 22px; line-height: 1;
    color: var(--text); min-width: 64px;
    text-align: right;
    font-feature-settings: "tnum";
    transition: color 0.4s;
  }
  .progress-pct.complete { color: var(--accent); }
  .new-day-btn {
    background: var(--text); color: var(--bg); border: none;
    border-radius: 100px;
    padding: 9px 18px;
    font-family: var(--font-body);
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.1em; text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
    display: inline-flex; align-items: center; gap: 6px;
    flex-shrink: 0;
  }
  .new-day-btn:hover { background: var(--accent); box-shadow: 0 4px 14px -4px var(--accent); }
  .new-day-btn:active { transform: scale(0.97); }
  .new-day-btn svg { width: 12px; height: 12px; }

  /* Modal */
  .modal-bg {
    position: fixed; inset: 0;
    background: rgba(28,25,23,0.4);
    backdrop-filter: blur(4px);
    z-index: 200;
    display: flex; align-items: center; justify-content: center;
    animation: fadeIn 0.2s ease;
    padding: 20px;
    overflow-y: auto;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: var(--surface);
    border-radius: 16px;
    padding: 28px;
    max-width: 380px;
    width: 100%;
    box-shadow: 0 30px 60px -20px rgba(0,0,0,0.3);
    animation: modalIn 0.3s var(--ease);
    max-height: calc(100vh - 40px);
    overflow-y: auto;
  }
  .modal.wide { max-width: 520px; }
  @keyframes modalIn {
    from { opacity: 0; transform: translateY(20px) scale(0.96); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .modal-title {
    font-family: var(--font-display);
    font-size: 22px; font-style: italic;
    margin-bottom: 8px; color: var(--text);
  }
  .modal-body {
    font-size: 14px; color: var(--muted);
    line-height: 1.5; margin-bottom: 20px;
  }
  .modal-body strong { color: var(--text); font-weight: 500; }

<script>
/* =========== Gist sync configuration =========== */
const GIST_ID = 'af715837aa55fbe4b368eee4ee6358a2';
const GIST_FILENAME = 'tasks.json';
const TOKEN_KEY = 'mr-rich-gh-token';

let syncToken = localStorage.getItem(TOKEN_KEY) || '';
let syncStatus = 'idle'; // idle | syncing | synced | error | offline | nokey
let lastSyncedAt = null;
let lastSyncedHash = null;
let pushTimer = null;
let isPushing = false;
// Safety gate: don't push to cloud until we've confirmed what's already there.
// Set to true once a pull has completed (success OR confirmed-empty), or when
// the user explicitly chooses to overwrite cloud with local.
let safeToPush = false;

function setSyncStatus(status, label) {
  syncStatus = status;
  const pill = document.getElementById('sync-pill');
  const lbl = document.getElementById('sync-label');
  if (!pill) return;
  pill.classList.remove('synced', 'syncing', 'error', 'offline');
  if (status === 'synced') pill.classList.add('synced');
  else if (status === 'syncing') pill.classList.add('syncing');
  else if (status === 'error') pill.classList.add('error');
  else if (status === 'offline') pill.classList.add('offline');
  lbl.textContent = label;
}

function hashState(s) {
  // Simple stable hash so we don't push redundantly
  return JSON.stringify(s).length + ':' + JSON.stringify(s).slice(0, 50);
}

async function pullFromGist() {
  if (!syncToken) { setSyncStatus('idle', 'Set up sync'); return null; }
  setSyncStatus('syncing', 'Pulling…');
  try {
    const res = await fetch('https://api.github.com/gists/' + GIST_ID, {
      headers: {
        'Accept': 'application/vnd.github+json',
        'Authorization': 'Bearer ' + syncToken,
        'X-GitHub-Api-Version': '2022-11-28'
      }
    });
    if (res.status === 401 || res.status === 403) {
      setSyncStatus('error', 'Token invalid');
      return null;
    }
    if (!res.ok) {
      setSyncStatus('error', 'Pull failed');
      return null;
    }
    const data = await res.json();
    const file = data.files && data.files[GIST_FILENAME];
    if (!file) {
      // Gist exists but our file doesn't — we'll create it on first push
      lastSyncedAt = Date.now();
      setSyncStatus('synced', 'Synced · just now');
      safeToPush = true; // confirmed-empty, safe to write
      return null;
    }
    let parsed;
    try { parsed = JSON.parse(file.content || '{}'); }
    catch (e) { setSyncStatus('error', 'Bad data on Gist'); return null; }
    lastSyncedAt = Date.now();
    lastSyncedHash = hashState(parsed);
    setSyncStatus('synced', 'Synced · just now');
    safeToPush = true; // we've now seen what's on the cloud, safe to write
    return parsed;
  } catch (e) {
    setSyncStatus('offline', 'Offline');
    return null;
  }
}

async function pushToGist() {
  if (!syncToken) return;
  if (!safeToPush) return; // don't risk overwriting unseen cloud data
  if (isPushing) return; // coalesce
  const snapshot = JSON.parse(JSON.stringify(state));
  const h = hashState(snapshot);
  if (h === lastSyncedHash) return; // nothing changed since last sync
  isPushing = true;
  setSyncStatus('syncing', 'Saving…');
  try {
    const res = await fetch('https://api.github.com/gists/' + GIST_ID, {
      method: 'PATCH',
      headers: {
        'Accept': 'application/vnd.github+json',
        'Authorization': 'Bearer ' + syncToken,
        'X-GitHub-Api-Version': '2022-11-28',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        files: {
          [GIST_FILENAME]: { content: JSON.stringify(snapshot, null, 2) }
        }
      })
    });
    if (res.status === 401 || res.status === 403) {
      setSyncStatus('error', 'Token invalid');
    } else if (!res.ok) {
      setSyncStatus('error', 'Save failed');
    } else {
      lastSyncedAt = Date.now();
      lastSyncedHash = h;
      setSyncStatus('synced', 'Synced · just now');
      // Update relative timestamp every minute
      scheduleStaleLabel();
    }
  } catch (e) {
    setSyncStatus('offline', 'Offline · will retry');
  } finally {
    isPushing = false;
  }
}

let staleTimer = null;
function scheduleStaleLabel() {
  if (staleTimer) clearTimeout(staleTimer);
  staleTimer = setTimeout(updateStaleLabel, 60000);
}
function updateStaleLabel() {
  if (syncStatus !== 'synced' || !lastSyncedAt) return;
  const mins = Math.floor((Date.now() - lastSyncedAt) / 60000);
  let txt;
  if (mins < 1) txt = 'Synced · just now';
  else if (mins < 60) txt = 'Synced · ' + mins + 'm ago';
  else if (mins < 24*60) txt = 'Synced · ' + Math.floor(mins/60) + 'h ago';
  else txt = 'Synced · a while ago';
  const lbl = document.getElementById('sync-label');
  if (lbl) lbl.textContent = txt;
  scheduleStaleLabel();
}

function queuePush() {
  if (!syncToken) return;
  if (pushTimer) clearTimeout(pushTimer);
  // Debounce 1.5s — many edits in a row become one network request
  pushTimer = setTimeout(pushToGist, 1500);
}

// Apply remote state to local, running migrations
function applyRemoteState(remote) {
  if (!remote || typeof remote !== 'object') return false;
  // Treat empty object as "no data"
  if (!remote.tasks && !remote.categories) return false;
  state = remote;
  state.tasks = state.tasks || [];
  state.categories = state.categories || [];
  state.tasks.forEach(t => {
    if (t.repeat === undefined) t.repeat = false;
    if (t.today === undefined) t.today = false;
  });
  if (state.streak === undefined) state.streak = 0;
  if (state.lastNewDay === undefined) state.lastNewDay = null;
  if (!state.dayConfig) state.dayConfig = { wakeTime: '08:00', sleepTime: '23:00', timeBlocks: [] };
  if (!state.dayConfig.timeBlocks) state.dayConfig.timeBlocks = [];
  if (state.dayConfig.nextBlockId === undefined) state.dayConfig.nextBlockId = 1;
  if (state.nextTaskId === undefined) {
    state.nextTaskId = Math.max(0, ...state.tasks.map(t => t.id || 0)) + 1;
  }
  if (state.nextCatId === undefined) state.nextCatId = 1;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  // Recompute init flags
  const todayTasks = state.tasks.filter(inToday);
  lastWasComplete = todayTasks.length > 0 && todayTasks.filter(t => t.done).length === todayTasks.length;
  return true;
}

/* =========== State =========== */
const STORAGE_KEY = 'mr-rich-board-v3';
const PRIORITY_CYCLE = ['none', 'low', 'medium', 'high'];
const COLOR_CHOICES = ['#d4502e', '#c79a3a', '#6a8054', '#4f7a99', '#7a5a8e', '#1c1917'];

const defaultState = {
  categories: [
    { id: 'c1', name: 'Mirror Think Digital', color: '#d4502e' },
    { id: 'c2', name: 'School (UWaterloo)', color: '#4f7a99' },
    { id: 'c3', name: 'Personal', color: '#6a8054' },
  ],
  tasks: [
    { id: 1, text: 'Check YouTube analytics dashboard', categoryId: 'c1', priority: 'medium', done: false, repeat: true },
    { id: 2, text: 'Upload next YouTube video', categoryId: 'c1', priority: 'high', done: false, repeat: false },
    { id: 3, text: 'Prepare for ECOOP interview', categoryId: 'c2', priority: 'high', done: false, repeat: false },
    { id: 4, text: 'Read for 30 minutes', categoryId: 'c3', priority: 'low', done: false, repeat: true },
  ],
  nextTaskId: 5,
  nextCatId: 4,
  streak: 0,
  lastNewDay: null,
  dayConfig: {
    wakeTime: '08:00',
    sleepTime: '23:00',
    timeBlocks: []
  }
};

let state = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null') || defaultState;
// Migrations
state.tasks.forEach(t => {
  if (t.repeat === undefined) t.repeat = false;
  if (t.today === undefined) t.today = false;
});
if (state.streak === undefined) state.streak = 0;
if (state.lastNewDay === undefined) state.lastNewDay = null;
if (!state.dayConfig) state.dayConfig = { wakeTime: '08:00', sleepTime: '23:00', timeBlocks: [] };
if (!state.dayConfig.timeBlocks) state.dayConfig.timeBlocks = [];
if (state.dayConfig.nextBlockId === undefined) state.dayConfig.nextBlockId = 1;

let editingTaskId = null;
let addingToColumn = null;
let creatingColumn = false;
let newColumnColor = COLOR_CHOICES[0];
let dragTaskId = null;
let lastWasComplete = false;
const seenTasks = new Set();
const seenCols = new Set();

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  queuePush();
}
function uid(prefix) {
  if (prefix === 'c') return 'c' + (state.nextCatId++);
  if (prefix === 'b') return 'b' + (state.dayConfig.nextBlockId++);
  return state.nextTaskId++;
}

// A task counts toward today's progress if it's a daily, OR a one-off marked Today
function inToday(t) { return t.repeat || t.today; }

/* =========== Audio =========== */
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
function playChime(priority) {
  // Distinct sound per priority — bigger, more triumphant for high; soft and quick for low
  const presets = {
    high:   { notes: [523.25, 659.25, 783.99, 1046.5], wave: 'triangle', stagger: 0.07,  vol: 0.14, decay: 0.85 },
    medium: { notes: [523.25, 659.25, 783.99],         wave: 'sine',     stagger: 0.06,  vol: 0.12, decay: 0.55 },
    low:    { notes: [392.00, 587.33],                 wave: 'sine',     stagger: 0.05,  vol: 0.10, decay: 0.40 },
    none:   { notes: [659.25],                          wave: 'sine',     stagger: 0,     vol: 0.08, decay: 0.28 },
  };
  const p = presets[priority] || presets.medium;
  try {
    ensureAudio();
    const now = audioCtx.currentTime;
    p.notes.forEach((freq, i) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = p.wave;
      osc.frequency.value = freq;
      const start = now + i * p.stagger;
      gain.gain.setValueAtTime(0, start);
      gain.gain.linearRampToValueAtTime(p.vol, start + 0.015);
      gain.gain.exponentialRampToValueAtTime(0.0001, start + p.decay);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(start);
      osc.stop(start + p.decay + 0.05);
    });
  } catch (e) {}
}
function playFanfare() {
  try {
    ensureAudio();
    const now = audioCtx.currentTime;
    const notes = [523.25, 659.25, 783.99, 1046.5];
    notes.forEach((freq, i) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'triangle';
      osc.frequency.value = freq;
      const start = now + i * 0.08;
      gain.gain.setValueAtTime(0, start);
      gain.gain.linearRampToValueAtTime(0.13, start + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001, start + 1.0);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(start);
      osc.stop(start + 1.05);
    });
  } catch (e) {}
}

/* =========== Time helpers =========== */
function parseTime(str) {
  if (!str || !str.includes(':')) return 0;
  const [h, m] = str.split(':').map(Number);
  return h * 60 + m;
}
function formatTime12(mins) {
  const h24 = Math.floor(mins / 60) % 24;
  const m = Math.floor(mins) % 60;
  const period = h24 >= 12 ? 'PM' : 'AM';
  const h12 = h24 === 0 ? 12 : (h24 > 12 ? h24 - 12 : h24);
  return h12 + ':' + String(m).padStart(2,'0') + ' ' + period;
}
function formatNow() {
  const d = new Date();
  return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}
function formatDuration(mins) {
  if (mins <= 0) return '0m';
  const h = Math.floor(mins / 60);
  const m = Math.floor(mins) % 60;
  if (h === 0) return m + 'm';
  if (m === 0) return h + 'h';
  return h + 'h ' + m + 'm';
}
function nowMinutes() {
  const d = new Date();
  return d.getHours() * 60 + d.getMinutes();
}

/* =========== Time bar update =========== */
function updateTimeBar() {
  const cfg = state.dayConfig;
  const wake = parseTime(cfg.wakeTime);
  let sleep = parseTime(cfg.sleepTime);
  // If sleep ≤ wake, treat sleep as next-day
  const wraps = sleep <= wake;
  if (wraps) sleep += 24 * 60;

  const totalAwake = sleep - wake;
  const rawNow = nowMinutes();

  // Determine "now" within the wake-to-sleep window
  let nowInDay;
  if (wraps && rawNow < wake) {
    // We're in the early-morning portion of a wrap day
    nowInDay = rawNow + 24 * 60;
  } else {
    nowInDay = rawNow;
  }

  let nowClamped = nowInDay;
  if (nowClamped < wake) nowClamped = wake;
  if (nowClamped > sleep) nowClamped = sleep;

  const elapsed = nowClamped - wake;
  const pct = Math.max(0, Math.min(100, (elapsed / totalAwake) * 100));
  const remaining = sleep - nowClamped;

  // Compute "free working time" (remaining minus future-portion of blocks)
  let blockedRemaining = 0;
  cfg.timeBlocks.forEach(b => {
    let bs = parseTime(b.start);
    let be = parseTime(b.end);
    // Allow blocks to fall on the next-day side of a wrap
    if (wraps) {
      if (bs < wake) bs += 24 * 60;
      if (be < wake || be < bs) be += 24 * 60;
    } else if (be < bs) {
      be += 24 * 60;
    }
    if (be <= wake || bs >= sleep) return;
    bs = Math.max(bs, wake);
    be = Math.min(be, sleep);
    if (be <= nowClamped) return;
    const fStart = Math.max(bs, nowClamped);
    blockedRemaining += be - fStart;
  });

  const workTimeRemaining = Math.max(0, remaining - blockedRemaining);

  // Update DOM
  document.getElementById('time-fill').style.width = pct + '%';
  document.getElementById('time-marker').style.left = pct + '%';
  document.getElementById('time-now').textContent = formatNow();

  let status, sub;
  if (nowInDay < wake) {
    status = 'Sleeping in';
    sub = 'Wake at ' + formatTime12(wake);
  } else if (nowInDay >= sleep) {
    status = 'Day complete';
    sub = 'Bedtime was ' + formatTime12(sleep % (24*60));
  } else {
    status = formatDuration(workTimeRemaining) + ' to work with';
    const sleepDisp = wraps ? sleep - 24*60 : sleep;
    sub = formatDuration(remaining) + ' awake · bedtime ' + formatTime12(sleepDisp);
    if (blockedRemaining > 0) {
      sub += ' · ' + formatDuration(blockedRemaining) + ' blocked';
    }
  }
  document.getElementById('time-status').textContent = status;
  document.getElementById('time-sub').textContent = sub;

  // Render blocks
  const blocksEl = document.getElementById('time-blocks');
  blocksEl.innerHTML = '';
  cfg.timeBlocks.forEach(b => {
    let bs = parseTime(b.start);
    let be = parseTime(b.end);
    if (wraps) {
      if (bs < wake) bs += 24 * 60;
      if (be < wake || be < bs) be += 24 * 60;
    } else if (be < bs) {
      be += 24 * 60;
    }
    if (be <= wake || bs >= sleep) return;
    const cs = Math.max(bs, wake);
    const ce = Math.min(be, sleep);

    const left = ((cs - wake) / totalAwake) * 100;
    const width = ((ce - cs) / totalAwake) * 100;

    const block = document.createElement('div');
    block.className = 'time-block';
    if (ce <= nowClamped) block.classList.add('past');
    else if (cs <= nowClamped && ce > nowClamped) block.classList.add('active');
    block.style.left = left + '%';
    block.style.width = width + '%';
    block.style.background = b.color;
    block.title = b.name + ' · ' + formatTime12(parseTime(b.start)) + ' – ' + formatTime12(parseTime(b.end));
    blocksEl.appendChild(block);
  });
}

/* =========== Render board =========== */
const board = document.getElementById('board');

function render() {
  const todayTasks = state.tasks.filter(inToday);
  const total = todayTasks.length;
  const done = todayTasks.filter(t => t.done).length;
  setStat('stat-remaining', total - done);
  setStat('stat-total', total);
  setStat('stat-done', done);
  setStat('stat-streak', state.streak);

  board.innerHTML = '';
  state.categories.forEach(cat => board.appendChild(buildColumn(cat)));

  if (creatingColumn) {
    board.appendChild(buildAddColumnForm());
  } else {
    const btn = document.createElement('button');
    btn.className = 'add-column';
    btn.textContent = '+ Add category';
    btn.onclick = () => {
      creatingColumn = true; newColumnColor = COLOR_CHOICES[0]; render();
      setTimeout(() => document.getElementById('new-col-input')?.focus(), 0);
    };
    board.appendChild(btn);
  }

  updateProgress(total, done);
  state.tasks.forEach(t => seenTasks.add(t.id));
  state.categories.forEach(c => seenCols.add(c.id));
}

function setStat(id, val) {
  const el = document.getElementById(id);
  if (el.textContent != val) {
    el.textContent = val;
    el.classList.remove('pulse');
    void el.offsetWidth;
    el.classList.add('pulse');
  }
}

/* =========== Task progress =========== */
const STATUS_TIERS = [
  { min: 0,    text: 'Just getting started' },
  { min: 1,    text: 'Underway' },
  { min: 25,   text: 'Building momentum' },
  { min: 50,   text: 'Halfway there' },
  { min: 75,   text: 'Almost done' },
  { min: 100,  text: 'All clear ✦' },
];

function updateProgress(total, done) {
  const pct = total === 0 ? 0 : Math.round((done / total) * 100);
  const fill = document.getElementById('progress-fill');
  const pctEl = document.getElementById('progress-pct');
  const status = document.getElementById('progress-status');
  const sub = document.getElementById('progress-sub');

  fill.style.width = pct + '%';
  pctEl.textContent = pct + '%';
  sub.textContent = total === 0 ? 'No tasks yet' : (done + ' of ' + total + ' complete');

  let tier = STATUS_TIERS[0];
  for (const t of STATUS_TIERS) if (pct >= t.min) tier = t;
  status.textContent = tier.text;

  const isComplete = pct === 100 && total > 0;
  fill.classList.toggle('complete', isComplete);
  pctEl.classList.toggle('complete', isComplete);
  status.classList.toggle('complete', isComplete);

  if (isComplete && !lastWasComplete) celebrateFullClear();
  lastWasComplete = isComplete;
}

function celebrateFullClear() {
  playFanfare();
  const rect = document.getElementById('progress-fill').getBoundingClientRect();
  const cx = rect.left + rect.width;
  const cy = rect.top + rect.height / 2;
  for (let i = 0; i < 40; i++) {
    setTimeout(() => burst(cx - Math.random()*60, cy, 8), i * 12);
  }
}

/* =========== Columns =========== */
function buildColumn(cat) {
  const col = document.createElement('div');
  col.className = 'column' + (seenCols.has(cat.id) ? '' : ' fresh');
  col.dataset.colId = cat.id;

  col.addEventListener('dragover', e => {
    e.preventDefault();
    col.classList.add('drag-over');
  });
  col.addEventListener('dragleave', e => {
    if (!col.contains(e.relatedTarget)) col.classList.remove('drag-over');
  });
  col.addEventListener('drop', e => {
    e.preventDefault();
    col.classList.remove('drag-over');
    if (dragTaskId == null) return;
    const task = state.tasks.find(t => t.id === dragTaskId);
    if (!task) return;
    task.categoryId = cat.id;
    const list = col.querySelector('.task-list');
    const after = getDragAfterElement(list, e.clientY);
    state.tasks = state.tasks.filter(t => t.id !== task.id);
    if (after) {
      const afterId = parseInt(after.dataset.taskId);
      const idx = state.tasks.findIndex(t => t.id === afterId);
      state.tasks.splice(idx, 0, task);
    } else {
      const lastIdx = findLastIndexInCategory(cat.id);
      if (lastIdx === -1) state.tasks.push(task);
      else state.tasks.splice(lastIdx + 1, 0, task);
    }
    save(); render();
  });

  const header = document.createElement('div');
  header.className = 'col-header';
  const dot = document.createElement('span');
  dot.className = 'col-dot'; dot.style.background = cat.color;
  header.appendChild(dot);

  const nameInput = document.createElement('input');
  nameInput.className = 'col-name';
  nameInput.value = cat.name;
  nameInput.onchange = () => {
    cat.name = nameInput.value.trim() || 'Untitled';
    save(); render();
  };
  nameInput.onkeydown = e => { if (e.key === 'Enter') nameInput.blur(); };
  header.appendChild(nameInput);

  const tasksInCat = state.tasks.filter(t => t.categoryId === cat.id);
  const count = document.createElement('span');
  count.className = 'col-count'; count.textContent = tasksInCat.length;
  header.appendChild(count);

  const del = document.createElement('button');
  del.className = 'col-del'; del.textContent = '×'; del.title = 'Delete category';
  del.onclick = () => {
    if (state.categories.length <= 1) { alert("Keep at least one category."); return; }
    const taskCount = tasksInCat.length;
    if (taskCount > 0 && !confirm('Delete "' + cat.name + '" and its ' + taskCount + ' task(s)?')) return;
    state.categories = state.categories.filter(c => c.id !== cat.id);
    state.tasks = state.tasks.filter(t => t.categoryId !== cat.id);
    save(); render();
  };
  header.appendChild(del);
  col.appendChild(header);

  const list = document.createElement('ul');
  list.className = 'task-list';
  if (tasksInCat.length === 0) {
    const empty = document.createElement('li');
    empty.className = 'empty-col'; empty.textContent = 'Nothing here yet.';
    list.appendChild(empty);
  } else {
    tasksInCat.forEach(t => list.appendChild(buildTaskCard(t)));
  }
  col.appendChild(list);

  if (addingToColumn === cat.id) {
    const input = document.createElement('input');
    input.className = 'add-task-input';
    input.placeholder = 'Task title — Enter to add, Esc to cancel';
    input.maxLength = 200;
    let committed = false;
    const commit = () => {
      if (committed) return;
      committed = true;
      const text = input.value.trim();
      if (text) {
        state.tasks.push({ id: uid(), text, categoryId: cat.id, priority: 'none', done: false, repeat: false, today: false });
        save();
      }
      addingToColumn = null;
      render();
    };
    input.onkeydown = e => {
      if (e.key === 'Enter') { e.preventDefault(); commit(); }
      else if (e.key === 'Escape') { committed = true; addingToColumn = null; render(); }
    };
    input.onblur = commit;
    col.appendChild(input);
    setTimeout(() => input.focus(), 0);
  } else {
    const addBtn = document.createElement('button');
    addBtn.className = 'add-task'; addBtn.textContent = '+ Add a task';
    addBtn.onclick = () => { addingToColumn = cat.id; render(); };
    col.appendChild(addBtn);
  }

  return col;
}

function buildTaskCard(t) {
  const card = document.createElement('li');
  card.className = 'task-card' + (t.done ? ' done' : '') + (seenTasks.has(t.id) ? '' : ' fresh');
  card.draggable = true;
  card.dataset.taskId = t.id;

  card.addEventListener('dragstart', e => {
    dragTaskId = t.id;
    card.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', String(t.id));
  });
  card.addEventListener('dragend', () => {
    card.classList.remove('dragging');
    dragTaskId = null;
    document.querySelectorAll('.column.drag-over').forEach(c => c.classList.remove('drag-over'));
  });

  const row = document.createElement('div');
  row.className = 'task-row';

  const check = document.createElement('div');
  check.className = 'check' + (t.done ? ' checked' : '');
  check.onclick = (ev) => {
    t.done = !t.done;
    if (t.done) { burst(ev.clientX, ev.clientY); playChime(t.priority || 'none'); }
    save(); render();
  };
  row.appendChild(check);

  if (editingTaskId === t.id) {
    const ta = document.createElement('textarea');
    ta.className = 'task-edit'; ta.value = t.text; ta.rows = 1;
    const autosize = () => { ta.style.height = 'auto'; ta.style.height = ta.scrollHeight + 'px'; };
    ta.oninput = autosize;
    let committed = false;
    function commit() {
      if (committed) return;
      committed = true;
      const v = ta.value.trim();
      if (v) t.text = v;
      editingTaskId = null;
      save(); render();
    }
    ta.onkeydown = e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); commit(); }
      else if (e.key === 'Escape') { committed = true; editingTaskId = null; render(); }
    };
    ta.onblur = commit;
    row.appendChild(ta);
    setTimeout(() => { ta.focus(); ta.setSelectionRange(ta.value.length, ta.value.length); autosize(); }, 0);
  } else {
    const text = document.createElement('span');
    text.className = 'task-text';
    text.textContent = t.text;
    text.title = 'Click to edit';
    text.onclick = (e) => { e.stopPropagation(); editingTaskId = t.id; render(); };
    row.appendChild(text);
  }

  const del = document.createElement('button');
  del.className = 'del-btn'; del.textContent = '×'; del.title = 'Delete';
  del.onclick = (e) => {
    e.stopPropagation();
    card.classList.add('removing');
    setTimeout(() => {
      state.tasks = state.tasks.filter(x => x.id !== t.id);
      save(); render();
    }, 230);
  };
  row.appendChild(del);
  card.appendChild(row);

  const meta = document.createElement('div');
  meta.className = 'task-meta';

  const chip = document.createElement('button');
  chip.className = 'priority-chip';
  chip.dataset.p = t.priority || 'none';
  chip.textContent = priorityLabel(t.priority || 'none');
  chip.title = 'Click to change priority';
  chip.onclick = (e) => {
    e.stopPropagation();
    const idx = PRIORITY_CYCLE.indexOf(t.priority || 'none');
    t.priority = PRIORITY_CYCLE[(idx + 1) % PRIORITY_CYCLE.length];
    save(); render();
  };
  meta.appendChild(chip);

  const repeatChip = document.createElement('button');
  repeatChip.className = 'repeat-chip' + (t.repeat ? ' active' : '');
  repeatChip.title = t.repeat ? 'Daily — repeats every New Day' : 'One-off — clears on New Day if completed';
  repeatChip.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>' + (t.repeat ? 'Daily' : 'Once');
  repeatChip.onclick = (e) => {
    e.stopPropagation();
    t.repeat = !t.repeat;
    // When switching to daily, the today flag becomes irrelevant (always today)
    if (t.repeat) t.today = false;
    save(); render();
  };
  meta.appendChild(repeatChip);

  // Today toggle — only relevant for one-off tasks (dailies are always today)
  if (!t.repeat) {
    const todayChip = document.createElement('button');
    todayChip.className = 'today-chip' + (t.today ? ' active' : '');
    todayChip.title = t.today ? 'Counts toward today\'s progress' : 'Not counted in today\'s progress';
    todayChip.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/>' +
      (t.today ? '<polyline points="8 12 11 15 16 9"/>' : '<line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>') +
      '</svg>' + (t.today ? 'Today' : 'Someday');
    todayChip.onclick = (e) => {
      e.stopPropagation();
      t.today = !t.today;
      save(); render();
    };
    meta.appendChild(todayChip);
  }

  card.appendChild(meta);
  return card;
}

function priorityLabel(p) {
  if (p === 'high') return '● High';
  if (p === 'medium') return '● Medium';
  if (p === 'low') return '● Low';
  return '○ No priority';
}

function buildAddColumnForm() {
  const form = document.createElement('div');
  form.className = 'add-column-form';
  const input = document.createElement('input');
  input.id = 'new-col-input'; input.placeholder = 'Category name'; input.maxLength = 40;
  const picker = document.createElement('div');
  picker.className = 'color-picker';
  COLOR_CHOICES.forEach(c => {
    const sw = document.createElement('div');
    sw.className = 'color-swatch' + (c === newColumnColor ? ' selected' : '');
    sw.style.background = c;
    sw.onclick = () => { newColumnColor = c; render(); setTimeout(() => document.getElementById('new-col-input')?.focus(), 0); };
    picker.appendChild(sw);
  });
  const actions = document.createElement('div');
  actions.className = 'form-actions';
  const create = document.createElement('button');
  create.className = 'form-btn primary'; create.textContent = 'Create';
  create.onclick = () => {
    const name = input.value.trim();
    if (!name) { input.focus(); return; }
    state.categories.push({ id: uid('c'), name, color: newColumnColor });
    creatingColumn = false;
    save(); render();
  };
  const cancel = document.createElement('button');
  cancel.className = 'form-btn secondary'; cancel.textContent = 'Cancel';
  cancel.onclick = () => { creatingColumn = false; render(); };
  actions.appendChild(cancel); actions.appendChild(create);
  input.onkeydown = e => {
    if (e.key === 'Enter') create.click();

  };
  form.appendChild(input); form.appendChild(picker); form.appendChild(actions);
  return form;
}

/* =========== Drag helpers =========== */
function getDragAfterElement(container, y) {
  const els = [...container.querySelectorAll('.task-card:not(.dragging)')];
  return els.reduce((closest, child) => {
    const box = child.getBoundingClientRect();
    const offset = y - box.top - box.height / 2;
    if (offset < 0 && offset > closest.offset) return { offset, element: child };
    return closest;
  }, { offset: -Infinity }).element;
}
function findLastIndexInCategory(catId) {
  let idx = -1;
  state.tasks.forEach((t, i) => { if (t.categoryId === catId) idx = i; });
  return idx;
}

/* =========== Confetti =========== */
function burst(x, y, count) {
  count = count || 14;
  const colors = ['#d4502e', '#1c1917', '#f5d4c5', '#c79a3a', '#6a8054'];
  for (let i = 0; i < count; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = x + 'px'; c.style.top = y + 'px';
    c.style.background = colors[i % colors.length];
    document.body.appendChild(c);
    const angle = (Math.PI * 2 * i) / count + Math.random() * 0.4;
    const dist = 60 + Math.random() * 80;
    const dx = Math.cos(angle) * dist;
    const dy = Math.sin(angle) * dist - 30;
    c.animate([
      { transform: 'translate(0,0) rotate(0)', opacity: 1 },
      { transform: 'translate(' + dx + 'px,' + dy + 'px) rotate(' + (Math.random()*720-360) + 'deg)', opacity: 0 }
    ], { duration: 700 + Math.random()*400, easing: 'cubic-bezier(0.22,1,0.36,1)' }).onfinish = () => c.remove();
  }
}

/* =========== New Day =========== */
function startNewDay() {
  const todayTasks = state.tasks.filter(inToday);
  const total = todayTasks.length;
  const done = todayTasks.filter(t => t.done).length;
  const wasComplete = total > 0 && done === total;

  if (wasComplete) state.streak = (state.streak || 0) + 1;
  else state.streak = 0;
  state.lastNewDay = Date.now();

  // Keep all repeats. Keep one-offs that are NOT done. Drop completed one-offs.
  state.tasks = state.tasks.filter(t => t.repeat || !t.done);
  // Uncheck everything that survived, and reset today flag on surviving one-offs
  state.tasks.forEach(t => {
    t.done = false;
    if (!t.repeat) t.today = false;
  });

  lastWasComplete = false;
  save(); render();
}

function showNewDayModal() {
  const todayTasks = state.tasks.filter(inToday);
  const total = todayTasks.length;
  const done = todayTasks.filter(t => t.done).length;
  const completedOneOffs = state.tasks.filter(t => !t.repeat && t.done).length;
  const incompleteOneOffs = state.tasks.filter(t => !t.repeat && !t.done).length;
  const repeats = state.tasks.filter(t => t.repeat).length;
  const wasComplete = total > 0 && done === total;

  const bg = document.createElement('div');
  bg.className = 'modal-bg';
  let body = 'This will <strong>delete ' + completedOneOffs + ' completed one-off task' + (completedOneOffs === 1 ? '' : 's') + '</strong>';
  if (incompleteOneOffs > 0) body += ', carry over <strong>' + incompleteOneOffs + ' unfinished one-off' + (incompleteOneOffs === 1 ? '' : 's') + '</strong>';
  body += ', and reactivate your <strong>' + repeats + ' daily task' + (repeats === 1 ? '' : 's') + '</strong>. Your progress bar will reset.';
  if (wasComplete) body += '<br><br>You finished everything — your streak goes up. ✦';
  else if (state.streak > 0) body += '<br><br>You didn\'t finish today, so your streak will reset.';

  bg.innerHTML = '<div class="modal">' +
    '<div class="modal-title">Start a new day?</div>' +
    '<div class="modal-body">' + body + '</div>' +
    '<div class="modal-actions">' +
      '<button class="form-btn secondary" id="cancel-newday">Not yet</button>' +
      '<button class="form-btn primary" id="confirm-newday">Start new day</button>' +
    '</div>' +
  '</div>';
  document.body.appendChild(bg);
  document.getElementById('cancel-newday').onclick = () => bg.remove();
  document.getElementById('confirm-newday').onclick = () => { bg.remove(); startNewDay(); };
  bg.onclick = e => { if (e.target === bg) bg.remove(); };
}
document.getElementById('new-day-btn').onclick = showNewDayModal;

/* =========== Streak reset =========== */
function showResetStreakModal() {
  if (state.streak === 0) {
    const el = document.getElementById('streak-stat');
    el.animate([
      { transform: 'translateX(0)' }, { transform: 'translateX(-3px)' },
      { transform: 'translateX(3px)' }, { transform: 'translateX(0)' }
    ], { duration: 250, easing: 'ease-out' });
    return;
  }
  const bg = document.createElement('div');
  bg.className = 'modal-bg';
  bg.innerHTML = '<div class="modal">' +
    '<div class="modal-title">Reset day streak?</div>' +
    '<div class="modal-body">' +
      'Your current streak is <strong>' + state.streak + ' day' + (state.streak === 1 ? '' : 's') + '</strong>. Resetting brings it back to zero. This can\'t be undone.' +
    '</div>' +
    '<div class="modal-actions">' +
      '<button class="form-btn secondary" id="cancel-streak">Keep streak</button>' +
      '<button class="form-btn primary" id="confirm-streak">Reset to 0</button>' +
    '</div>' +
  '</div>';
  document.body.appendChild(bg);
  document.getElementById('cancel-streak').onclick = () => bg.remove();
  document.getElementById('confirm-streak').onclick = () => {
    state.streak = 0; save(); render(); bg.remove();
  };
  bg.onclick = e => { if (e.target === bg) bg.remove(); };
}
document.getElementById('streak-stat').onclick = showResetStreakModal;

/* =========== Day settings modal =========== */
function showDaySettingsModal() {
  // Local working copy

  if (!draft.timeBlocks) draft.timeBlocks = [];

  const bg = document.createElement('div');
  bg.className = 'modal-bg';
  const modal = document.createElement('div');
  modal.className = 'modal wide';
  bg.appendChild(modal);

  function renderModal() {
    modal.innerHTML = '';

    const title = document.createElement('div');
    title.className = 'modal-title'; title.textContent = 'Day settings';
    modal.appendChild(title);

    const desc = document.createElement('div');
    desc.className = 'modal-body';
    desc.innerHTML = 'Set your wake and sleep times to track today\'s remaining work time. Add time blocks for things like meals or class to subtract them from your free hours.';
    modal.appendChild(desc);

    // Wake / sleep row

    wakeIn.oninput = () => { draft.wakeTime = wakeIn.value; };
    wakeField.appendChild(wakeIn);
    const sleepField = document.createElement('div');
    sleepField.className = 'field';
    sleepField.innerHTML = '<label class="field-label">Sleep</label>';
    const sleepIn = document.createElement('input');
    sleepIn.type = 'time'; sleepIn.value = draft.sleepTime;
    sleepIn.oninput = () => { draft.sleepTime = sleepIn.value; };
    sleepField.appendChild(sleepIn);
    row.appendChild(wakeField); row.appendChild(sleepField);
    modal.appendChild(row);

    // Blocks
    const blocksField = document.createElement('div');
    blocksField.className = 'field';
    blocksField.innerHTML = '<label class="field-label">Recurring time blocks</label>';
    const list = document.createElement('div');
    list.className = 'blocks-list';

    if (draft.timeBlocks.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'blocks-empty';
      empty.textContent = 'No blocks yet. Add one for meals, class, gym, etc.';
      list.appendChild(empty);
    } else {
      draft.timeBlocks.forEach((b, idx) => list.appendChild(buildBlockRow(b, idx)));
    }

    function buildBlockRow(block, idx) {
      const r = document.createElement('div');
      r.className = 'block-row';

      const name = document.createElement('input');
      name.type = 'text'; name.placeholder = 'Block name (e.g. Lunch)';
      name.value = block.name;
      name.oninput = () => { block.name = name.value; };
      r.appendChild(name);

      const start = document.createElement('input');
      start.type = 'time'; start.value = block.start;
      start.oninput = () => { block.start = start.value; };
      r.appendChild(start);

      const end = document.createElement('input');
      end.type = 'time'; end.value = block.end;
      end.oninput = () => { block.end = end.value; };
      r.appendChild(end);

      const colorWrap = document.createElement('div');
      colorWrap.style.position = 'relative';
      const colorBtn = document.createElement('button');
      colorBtn.className = 'block-color-btn';
      colorBtn.style.background = block.color;
      colorBtn.title = 'Color';
      colorBtn.onclick = (e) => {
        e.stopPropagation();
        // Toggle popover
        const existing = colorWrap.querySelector('.block-color-popover');
        if (existing) { existing.remove(); return; }
        const pop = document.createElement('div');
        pop.className = 'block-color-popover';
        COLOR_CHOICES.forEach(c => {
          const sw = document.createElement('div');
          sw.className = 'color-swatch' + (c === block.color ? ' selected' : '');
          sw.style.background = c;
          sw.onclick = (ev) => {
            ev.stopPropagation();
            block.color = c;
            renderModal();
          };
          pop.appendChild(sw);
        });
        colorWrap.appendChild(pop);
        const closer = (ev) => {
          if (!colorWrap.contains(ev.target)) {
            pop.remove();
            document.removeEventListener('click', closer);
          }
        };
        setTimeout(() => document.addEventListener('click', closer), 0);
      };
      colorWrap.appendChild(colorBtn);
      r.appendChild(colorWrap);

      const delBtn = document.createElement('button');
      delBtn.className = 'block-del'; delBtn.textContent = '×'; delBtn.title = 'Remove block';
      delBtn.onclick = () => {
        draft.timeBlocks.splice(idx, 1);
        renderModal();
      };
      r.appendChild(delBtn);

      return r;
    }

    blocksField.appendChild(list);

    const addBtn = document.createElement('button');
    addBtn.className = 'add-block-btn';
    addBtn.textContent = '+ Add a time block';
    addBtn.onclick = () => {
      draft.timeBlocks.push({
        id: uid('b'),
        name: '',
        start: '12:00',
        end: '13:00',
        color: COLOR_CHOICES[Math.floor(Math.random() * COLOR_CHOICES.length)]
      });
      renderModal();
    };
    blocksField.appendChild(addBtn);
    modal.appendChild(blocksField);

    // Actions
    const actions = document.createElement('div');
    actions.className = 'modal-actions';
    const cancel = document.createElement('button');
    cancel.className = 'form-btn secondary'; cancel.textContent = 'Cancel';
    cancel.onclick = () => bg.remove();
    const saveBtn = document.createElement('button');
    saveBtn.className = 'form-btn primary'; saveBtn.textContent = 'Save settings';
    saveBtn.onclick = () => {
      // Filter out blocks with no name as user-friendly cleanup
      draft.timeBlocks = draft.timeBlocks.filter(b => (b.name || '').trim() !== '');
      state.dayConfig.wakeTime = draft.wakeTime;
      state.dayConfig.sleepTime = draft.sleepTime;
      state.dayConfig.timeBlocks = draft.timeBlocks;
      save();
      updateTimeBar();
      bg.remove();
    };
    actions.appendChild(cancel); actions.appendChild(saveBtn);
    modal.appendChild(actions);
  }

  renderModal();
  document.body.appendChild(bg);
  bg.onclick = e => { if (e.target === bg) bg.remove(); };
}
document.getElementById('settings-btn').onclick = showDaySettingsModal;

/* =========== Sync setup modal =========== */
function showSyncModal() {
  const bg = document.createElement('div');
  bg.className = 'modal-bg';
  const hasToken = !!syncToken;

  bg.innerHTML = '<div class="modal wide">' +
    '<div class="modal-title">' + (hasToken ? 'Sync settings' : 'Set up sync') + '</div>' +
    '<div class="modal-body">' +
      (hasToken
        ? 'Sync is active on this device. Your tasks save to a private GitHub Gist and pull on every page load. To use the same data on another device, open the same URL there and paste your token.'
        : 'Sync your tasks across devices using a private GitHub Gist. You\'ll need a personal access token from GitHub.'
      ) +
    '</div>' +

    (!hasToken ? '<div class="setup-step"><strong>Step 1.</strong> Create a token at <a href="https://github.com/settings/tokens?type=beta" target="_blank">github.com/settings/tokens</a> with <strong>Gists: Read and write</strong> permission.</div>' +
      '<div class="setup-step"><strong>Step 2.</strong> Paste it below. It saves only on this device — it\'s never sent anywhere except GitHub.</div>'
      : '') +

    '<div class="field">' +
      '<label class="field-label">GitHub token</label>' +
      '<input type="password" id="token-input" placeholder="github_pat_..." autocomplete="off" value="' + (hasToken ? '••••••••••••••••' : '') + '"/>' +
    '</div>' +

    '<div class="setup-step" style="font-size: 11px; color: var(--muted);">' +
      'Gist ID: <code>' + GIST_ID + '</code>' +
    '</div>' +

    '<div class="modal-actions">' +
      '<button class="form-btn secondary" id="cancel-sync">Cancel</button>' +
      '<button class="form-btn primary" id="save-sync">' + (hasToken ? 'Update token' : 'Save & sync') + '</button>' +
    '</div>' +

    (hasToken ?
      '<div class="setup-step" style="margin-top: 16px;">' +
        '<strong>Force a pull?</strong> If this device isn\'t showing the latest data from your other devices, tap below to pull fresh from the Gist (replaces this device\'s data with cloud data).' +
      '</div>' +
      '<button class="form-btn primary" id="force-pull" style="width:100%; margin-bottom: 10px;">Pull latest from cloud</button>' +
      '<div class="danger-zone">' +
        '<button class="form-btn" id="disconnect-sync" style="width:100%">Disconnect this device</button>' +
      '</div>' : '') +
  '</div>';

  document.body.appendChild(bg);

  const tokenInput = document.getElementById('token-input');
  if (hasToken) {
    tokenInput.onfocus = () => { if (tokenInput.value.startsWith('•')) tokenInput.value = ''; };
  }

  document.getElementById('cancel-sync').onclick = () => bg.remove();
  document.getElementById('save-sync').onclick = async () => {
    const v = tokenInput.value.trim();
    if (!v || v.startsWith('•')) {
      if (!hasToken) { tokenInput.focus(); return; }
      bg.remove(); return;
    }
    syncToken = v;
    localStorage.setItem(TOKEN_KEY, v);
    bg.remove();
    // Try a pull right away to test the token & merge in remote data
    const remote = await pullFromGist();
    if (remote && (remote.tasks || remote.categories)) {
      const proceed = confirm('Found existing data on your Gist. Replace this device\'s local data with it?\n\n(OK = use cloud version. Cancel = keep local, which will overwrite cloud on next save.)');
      if (proceed) {
        applyRemoteState(remote);
        render(); updateTimeBar();
      } else {
        // User explicitly chose to overwrite cloud
        safeToPush = true;
        lastSyncedHash = null;
        pushToGist();
      }
    } else {
      // No remote data — push our local state up so the gist has something
      safeToPush = true;
      lastSyncedHash = null;
      pushToGist();
    }
  };
  if (hasToken) {
    document.getElementById('force-pull').onclick = async () => {
      const btn = document.getElementById('force-pull');
      btn.textContent = 'Pulling…';
      btn.disabled = true;
      const remote = await pullFromGist();
      if (remote && (remote.tasks || remote.categories)) {
        const ok = applyRemoteState(remote);
        if (ok) {
          render(); updateTimeBar();
          bg.remove();
          // Brief flash so user sees something happened
          const pill = document.getElementById('sync-pill');
          pill.animate([
            { transform: 'scale(1)' }, { transform: 'scale(1.15)' }, { transform: 'scale(1)' }
          ], { duration: 350, easing: 'cubic-bezier(0.22,1,0.36,1)' });
        } else {
          btn.textContent = 'No data on cloud yet';
          btn.disabled = false;
        }
      } else {
        btn.textContent = 'Cloud is empty — nothing to pull';
        btn.disabled = false;
      }
    };
    document.getElementById('disconnect-sync').onclick = () => {
      if (!confirm('Disconnect sync on this device?\n\nYour data stays on this device and on the Gist, but they will no longer talk to each other until you re-enter a token.')) return;
      syncToken = '';
      localStorage.removeItem(TOKEN_KEY);
      setSyncStatus('idle', 'Local only');
      bg.remove();
    };
  }
  bg.onclick = e => { if (e.target === bg) bg.remove(); };
}
document.getElementById('sync-pill').onclick = showSyncModal;

/* =========== Init =========== */
(async function boot() {
  // Initialize lastWasComplete from current state
  {
    const todayTasks = state.tasks.filter(inToday);
    const total = todayTasks.length;
    const done = todayTasks.filter(t => t.done).length;
    lastWasComplete = total > 0 && done === total;
  }

  // First paint with whatever's local
  render();
  updateTimeBar();
  setInterval(updateTimeBar, 30000);

  // If we have a token, pull from Gist to overlay any remote changes
  if (syncToken) {
    setSyncStatus('syncing', 'Syncing…');
    const remote = await pullFromGist();
    if (remote && (remote.tasks || remote.categories)) {
      const localHash = hashState(state);
      const remoteHash = hashState(remote);
      if (localHash !== remoteHash) {
        if (applyRemoteState(remote)) {
          render(); updateTimeBar();
        }
      }
    }
  } else {
    setSyncStatus('idle', 'Local only');
  }
})();
</script>
